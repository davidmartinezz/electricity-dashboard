services:
  - type: web
    name: electricity-dashboard
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt && cd frontend && npm ci && npm run build
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATA_DIR
        value: /data/electricity-price-predictor
    healthCheckPath: /api/health
    disk:
      name: electricity-data
      mountPath: /data
      sizeGB: 1
